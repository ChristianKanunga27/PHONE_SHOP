<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PhoneHub</title>
  <style>
    :root {
      --accent: #FF9500;
      --accent-contrast: #ffffff;
      --bg: blue;
      --surface: #ffffff;
      --muted: #6B7280;
      --text: #1F2937;
      --error: #D14343;
      --success-bg: #ECFDF5;
      --success-border: #A7F3D0;
      --focus: rgba(255,149,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .welcome-title{
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: green;
      margin-bottom: 15px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.2;
    }

    label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--muted); }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: box-shadow 120ms ease, border-color 120ms ease;
    }

    input:focus {
      box-shadow: 0 0 0 4px var(--focus);
      border-color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .actions { display: flex; gap: 12px; align-items: center; margin-top: 14px; }

    .btn {
      background: var(--accent);
      color: var(--accent-contrast);
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
    }

    .btn:hover {
      background: #E68A00;
    }

    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid #E5E7EB;
    }

    .btn.secondary:hover {
      background: #F3F4F6;
    }

    .error { color: var(--error); font-size: 13px; margin-top: 8px; }
    .success { background: var(--success-bg); border: 1px solid var(--success-border); padding: 12px; border-radius: 8px; color: #065F46; }

    .links {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="welcome-title">Welcome to CIA_Phone Shop</div>
    <h1>Login to Your Account</h1>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required placeholder="chris@gmail.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required placeholder="Your password">
      </div>

      <div class="actions">
        <button type="submit" class="btn">Login</button>
        <button type="button" class="btn secondary" onclick="location.href='home.html'">Cancel</button>
      </div>

      <div id="loginError" class="error" role="alert" style="display:none"></div>
    </form>

    <div id="loginSuccess" class="success" style="display:none;margin-top:16px">
      <strong>Login successful!</strong>
      <div id="successMessage" style="margin-top:8px"></div>
    </div>

    <div class="links">
      <p>Don't have an account? <a href="registra.html">Register here</a></p>
      <p><a href="home.html">Back to Home</a></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('loginError');

      errorBox.style.display = 'none';
      errorBox.textContent = '';

      if (!email || !password) {
        errorBox.textContent = 'Please fill in all required fields.';
        errorBox.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorBox.textContent = data.message || `Login failed (${response.status})`;
          errorBox.style.display = 'block';
          return;
        }

        // Store user in localStorage
        const userForStorage = {
          username: data.user?.username || email,
          email: data.user?.email || email,
          role: data.user?.role || 'user'
        };
        localStorage.setItem('currentUser', JSON.stringify(userForStorage));

        // Show success and redirect
        const successBox = document.getElementById('loginSuccess');
        successBox.style.display = 'block';
        document.getElementById('successMessage').textContent = data.message || 'Login successful';

        setTimeout(() => {
          window.location.href = data.redirect || 'account.html';
        }, 1000);

      } catch (error) {
        console.error('Login request failed:', error);
        errorBox.textContent = `An error occurred: ${error.message || 'Please try again later.'}`;
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
